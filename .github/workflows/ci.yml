name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format (${{ matrix.manifest }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        manifest:
          - Cargo.toml
          - widget/Cargo.toml
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --manifest-path ${{ matrix.manifest }} -- --check

  check:
    name: Check (${{ matrix.label }}, ${{ matrix.manifest }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: aarch64-apple-darwin
            os: macos-latest
            target: aarch64-apple-darwin
          - label: x86_64-apple-darwin
            os: macos-latest
            target: x86_64-apple-darwin
          - label: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - label: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - label: x86_64-pc-windows-msvc
            os: windows-latest
            target: x86_64-pc-windows-msvc
        manifest:
          - Cargo.toml
          - widget/Cargo.toml
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libfontconfig1-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev
      - name: Install Rust stable with target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run cargo check
        run: cargo check --manifest-path ${{ matrix.manifest }} --target ${{ matrix.target }}

  clippy:
    name: Clippy (${{ matrix.manifest }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        manifest:
          - Cargo.toml
          - widget/Cargo.toml
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libfontconfig1-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --all-targets --manifest-path ${{ matrix.manifest }} -- -D warnings
